            if (examProgress[i].score > best) best = examProgress[i].score;
        }
        document.getElementById('completedCount').innerText = completed;
        document.getElementById('bestScore').innerText = best;
        
        for (let i = 0; i < 5; i++) {
            const btn = document.querySelector(`.exam-btn[data-exam="${i}"]`);
            if (btn) {
                if (examProgress[i].completed) {
                    btn.classList.add('completed');
                    btn.style.background = "#2c7a4d";
                } else {
                    btn.classList.remove('completed');
                    btn.style.background = "#1e3a5f";
                }
            }
        }
    }

    function saveAnswer(examIdx, part, value) {
        const saved = localStorage.getItem(`examAnswers_${examIdx}`);
        const answers = saved ? JSON.parse(saved) : {};
        answers[part] = value;
        localStorage.setItem(`examAnswers_${examIdx}`, JSON.stringify(answers));
    }

    function loadAnswers(examIdx) {
        const saved = localStorage.getItem(`examAnswers_${examIdx}`);
        if (saved) {
            try {
                return JSON.parse(saved);
            } catch(e) { return {}; }
        }
        return {};
    }

    function renderExam(examIdx) {
        const exam = examData[examIdx];
        if (!exam) return;
        
        const container = document.getElementById(`exam${examIdx}`);
        if (!container) return;
        
        const savedAnswers = loadAnswers(examIdx);
        const isCompleted = examProgress[examIdx].completed;
        
        let html = `
            <div class="exam-title">📖 ${exam.name}</div>
            <div class="instructions">
                ⏱️ TIME: 2 Hours | TOTAL: 60 Marks<br>
                📌 INSTRUCTIONS: Answer QUESTION 1 (Compulsory - 30 marks) and ANY TWO from Questions 2, 3, 4 (15 marks each)
            </div>
            
            <!-- QUESTION 1 -->
            <div class="question-card">
                <div class="q-header"><span>🔴 QUESTION 1 (Compulsory)</span><span class="q-marks">30 Marks</span></div>
        `;
        
        // Q1 parts
        for (let i = 0; i < exam.q1_parts.length; i++) {
            const part = exam.q1_parts[i];
            const answerKey = `q1_${part.letter}`;
            const savedValue = savedAnswers[answerKey] || '';
            html += `
                <div class="q-text"><strong>${part.letter})</strong> ${part.text} <span class="q-marks">(${part.marks} marks)</span></div>
                <div class="answer-area">
                    <textarea id="exam${examIdx}_${answerKey}" placeholder="Write your answer for ${part.letter}) here..." rows="3">${escapeHtmlText(savedValue)}</textarea>
                    <button class="check-btn" onclick="toggleModelAnswer(${examIdx}, '${answerKey}', \`${escapeHtmlText(part.model)}\`)">🔍 Check Model Answer</button>
                    <div id="model-${examIdx}-${answerKey}" class="model-answer"></div>
                </div>
            `;
        }
        
        html += `</div>`;
        
        // Q2, Q3, Q4
        for (let i = 2; i <= 4; i++) {
            const qKey = `q${i}`;
            const question = exam[qKey];
            const savedValue = savedAnswers[qKey] || '';
            html += `
                <div class="question-card">
                    <div class="q-header"><span>🟢 ${question.text.substring(0, 80)}...</span><span class="q-marks">15 Marks</span></div>
                    <div class="answer-area">
                        <textarea id="exam${examIdx}_${qKey}" placeholder="Write your answer for ${qKey.toUpperCase()} here..." rows="5">${escapeHtmlText(savedValue)}</textarea>
                        <button class="check-btn" onclick="toggleModelAnswer(${examIdx}, '${qKey}', \`${escapeHtmlText(question.model)}\`)">🔍 Check Model Answer</button>
                        <div id="model-${examIdx}-${qKey}" class="model-answer"></div>
                    </div>
                </div>
            `;
        }
        
        html += `
            <div class="exam-actions">
                <button class="btn-secondary" onclick="resetExam(${examIdx})">⟳ Reset Exam</button>
                <button class="btn-primary ${isCompleted ? 'btn-success' : ''}" onclick="markComplete(${examIdx})">
                    ${isCompleted ? '✅ Already Completed' : '📌 Mark Exam as Complete'}
                </button>
            </div>
        `;
        
        if (isCompleted) {
            html += `<div class="completion-badge">✅ You completed this exam! Score: ${examProgress[examIdx].score}%</div>`;
        }
        
        container.innerHTML = html;
        
        // Attach save events
        for (let i = 0; i < exam.q1_parts.length; i++) {
            const part = exam.q1_parts[i];
            const textarea = document.getElementById(`exam${examIdx}_q1_${part.letter}`);
            if (textarea) {
                textarea.addEventListener('input', function() {
                    saveAnswer(examIdx, `q1_${part.letter}`, this.value);
                });
            }
        }
        
        for (let i = 2; i <= 4; i++) {
            const textarea = document.getElementById(`exam${examIdx}_q${i}`);
            if (textarea) {
                textarea.addEventListener('input', function() {
                    saveAnswer(examIdx, `q${i}`, this.value);
                });
            }
        }
    }
    
    function escapeHtmlText(str) {
        if (!str) return '';
        return str.replace(/[&<>`]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            if (m === '`') return '&#96;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    function toggleModelAnswer(examIdx, partKey, modelText) {
        const modelDiv = document.getElementById(`model-${examIdx}-${partKey}`);
        if (modelDiv) {
            if (modelDiv.classList.contains('show')) {
                modelDiv.classList.remove('show');
                modelDiv.innerHTML = '';
            } else {
                modelDiv.innerHTML = `<strong>📖 Model Answer:</strong><br>${modelText}`;
                modelDiv.classList.add('show');
            }
        }
    }
    
    function resetExam(examIdx) {
        if (confirm(`Are you sure you want to reset Exam ${examIdx + 1}? All your answers will be lost.`)) {
            localStorage.removeItem(`examAnswers_${examIdx}`);
            examProgress[examIdx] = { completed: false, score: 0 };
            saveProgress();
            renderExam(examIdx);
        }
    }
    
    function markComplete(examIdx) {
        if (examProgress[examIdx].completed) {
            alert("This exam is already marked as complete!");
            return;
        }
        
        const savedAnswers = localStorage.getItem(`examAnswers_${examIdx}`);
        let totalLength = 0;
        if (savedAnswers) {
            const answers = JSON.parse(savedAnswers);
            for (let key in answers) {
                totalLength += answers[key].length;
            }
        }
        
        let score = Math.min(100, Math.floor(totalLength / 25));
        if (score < 25) score = 25;
        
        examProgress[examIdx] = { completed: true, score: score };
        saveProgress();
        renderExam(examIdx);
        
        alert(`✅ Exam ${examIdx + 1} marked as complete!\nEstimated score: ${score}%\nKeep practicing to improve!`);
    }
    
    // Make functions global
    window.toggleModelAnswer = toggleModelAnswer;
    window.resetExam = resetExam;
    window.markComplete = markComplete;
    
    // Exam switching
    document.querySelectorAll('.exam-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const examIdx = parseInt(this.getAttribute('data-exam'));
            currentExam = examIdx;
            
            document.querySelectorAll('.exam-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            
            document.querySelectorAll('.exam-container').forEach(container => {
                container.classList.remove('active-exam');
            });
            document.getElementById(`exam${examIdx}`).classList.add('active-exam');
            
            renderExam(examIdx);
        });
    });
    
    // Initialize
    loadProgress();
    renderExam(0);
</script>
</body>
</html>
